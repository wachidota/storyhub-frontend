<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biblioteca</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/books.css">

</head>
<body>

<nav class="navbar">

<div class="container navbar-content">

<div class="logo">
StoryHub
</div>

<div class="nav-links">

<a href="dashboard.html">Dashboard</a>

<a
    href="create-book.html"
    class="btn btn-primary">

    Escribir Libro

</a>

</div>

</div>

</nav>

<main class="container">

<h1 class="page-title">
Explorar Libros
</h1>

<section class="filters card">

<div class="filter-group">

<label>Buscar</label>

<input
type="text"
placeholder="Título o autor">

</div>

<div class="filter-group">

<label>Categoría</label>

<select
    id="categoriaFiltro"
    onchange="filtrarCategoria()">

    <option value="">
        Todas
    </option>

</select>

</div>

</section>

<section id="booksGrid" class="books-grid">

<div class="book-card card">

<div class="book-cover"></div>

<h3>El Imperio Perdido</h3>

<p class="author">
Juan Olascoaga
</p>

<p class="category">
Fantasía
</p>

<p class="rating">
⭐ 4.8
</p>

<a href="book-detail.html">
<button class="btn btn-primary">
Ver Libro
</button>
</a>

</div>

<div class="book-card card">

<div class="book-cover"></div>

<h3>La Última Luna</h3>

<p class="author">
Autor
</p>

<p class="category">
Aventura
</p>

<p class="rating">
⭐ 4.5
</p>

<button class="btn btn-primary">
Ver Libro
</button>

</div>

<div class="book-card card">

<div class="book-cover"></div>

<h3>Crónicas del Vacío</h3>

<p class="author">
Autor
</p>

<p class="category">
Sci-Fi
</p>

<p class="rating">
⭐ 4.9
</p>

<button class="btn btn-primary">
Ver Libro
</button>

</div>

</section>

</main>

</body>
</html>
